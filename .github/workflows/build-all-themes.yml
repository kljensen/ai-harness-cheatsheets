name: Build All-Themes PDF

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Install Ghostscript
        run: sudo apt-get update && sudo apt-get install -y ghostscript

      - name: Build theme variants
        run: ./scripts/render-theme-variants.sh

      - name: Rename combined PDF
        run: mv claude-code/variants/ALL-THEMES.pdf claude-code-all-themes.pdf

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claude-code-all-themes.pdf
            claude-code/variants/cheatsheet-*.pdf
