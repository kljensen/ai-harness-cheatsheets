name: Build All-Themes PDF

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Install Ghostscript and woff2
        run: sudo apt-get update && sudo apt-get install -y ghostscript woff2

      - name: Fetch Anthropic fonts
        run: ./scripts/fetch-fonts.sh

      - name: Build theme variants
        run: ./scripts/render-theme-variants.sh

      - name: Rename combined PDF
        run: mv claude-code/variants/ALL-THEMES.pdf claude-code.pdf

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: claude-code.pdf
